<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background: #f4f4f4; color: #333; }
        header { border-bottom: 2px solid #333; margin-bottom: 20px; padding-bottom: 10px; }
        h1 a { text-decoration: none; color: #333; }
        .post-item { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .post-item a { font-weight: bold; text-decoration: none; color: #007bff; }
        .post-meta { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">{{ .Site.Title }}</a></h1>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
</body>
</html>
